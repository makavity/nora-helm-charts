apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nora.fullname" . }}-config
  labels:
    {{- include "nora.labels" . | nindent 4 }}
data:
  config.toml: |
    [server]
    host = {{ .Values.config.server.host | quote }}
    port = {{ .Values.config.server.port | default 4000 }}

    [storage]
    mode = {{ .Values.config.storage.mode | quote }}
    path = {{ .Values.config.storage.path | quote }}
    {{- if eq .Values.config.storage.mode "s3" }}
    s3_url = {{ .Values.config.storage.s3_url | quote }}
    bucket = {{ .Values.config.storage.bucket | quote }}
    s3_region = {{ .Values.config.storage.s3_region | default "us-east-1" | quote }}
    {{- end }}

    {{- if or .Values.config.docker.upstreams .Values.config.docker.proxy_timeout }}
    [docker]
    proxy_timeout = {{ .Values.config.docker.proxy_timeout | default 60 }}
    {{- range .Values.config.docker.upstreams }}

    [[docker.upstreams]]
    url = {{ .url | quote }}
    {{- if .auth }}
    auth = {{ .auth | quote }}
    {{- end }}
    {{- end }}
    {{- end }}

    [gc]
    enabled = {{ .Values.config.gc.enabled }}
    interval = {{ .Values.config.gc.interval }}

    [retention]
    enabled = {{ .Values.config.retention.enabled }}
    interval = {{ .Values.config.retention.interval }}
    {{- if .Values.config.retention.rules }}
    {{- range .Values.config.retention.rules }}

    [[retention.rules]]
    {{- range $k, $v := . }}
    {{ $k }} = {{ $v | quote }}
    {{- end }}
    {{- end }}
    {{- end }}
