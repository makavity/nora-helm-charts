replicaCount: 1

image:
  repository: ghcr.io/getnora-io/nora
  # -- Overrides the image tag. Defaults to Chart.appVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 4000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: registry.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: registry-tls
  #    hosts:
  #      - registry.example.com

httpRoute:
  enabled: false
  annotations: {}
  labels: {}
  parentRefs: []
  #  - name: shared-gateway
  #    namespace: gateway-system
  #    sectionName: http
  hostnames: []
  #  - registry.example.com
  extraRules: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters: []

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  annotations: {}

config:
  server:
    host: "0.0.0.0"
    port: 4000
    # -- Public URL for UI install commands and auth realm.
    # Set this when NORA is behind Ingress/reverse proxy.
    # Example: "https://registry.example.com"
    public_url: ""
  storage:
    mode: local
    path: /data/storage
    # -- S3 endpoint URL (required when mode=s3)
    s3_url: ""
    # -- S3 bucket name (required when mode=s3)
    bucket: ""
    # -- S3 region
    s3_region: "us-east-1"
  docker:
    proxy_timeout: 60
    # -- Docker upstream registries for proxy/cache.
    # Auth credentials should come from existingSecret, not inline here.
    upstreams: []
    #  - url: https://registry-1.docker.io
    #  - url: https://private.registry.io
    #    auth: "user:token"
  gc:
    enabled: true
    interval: 86400
  retention:
    enabled: false
    interval: 86400
    rules: []

# -- Name of an existing Secret to mount as /config/secrets.toml.
# Use this to keep registry credentials out of values.yaml.
# The Secret should contain a key "secrets.toml" with TOML content, e.g.:
#   [[docker.upstreams]]
#   url = "https://private.registry.io"
#   auth = "user:token"
# These upstreams are merged with config.docker.upstreams (Secret wins for same URL).
existingSecret: ""

# -- Extra environment variables for the NORA container.
# Supports full Kubernetes env spec: plain values, secretKeyRef, configMapKeyRef.
# Example:
#   extraEnv:
#     - name: NORA_S3_STORAGE_ACCESS_KEY
#       valueFrom:
#         secretKeyRef:
#           name: my-s3-secret
#           key: access-key
#     - name: NORA_AUTH_ENABLED
#       value: "true"
extraEnv: []

# -- Additional envFrom entries for the NORA container.
# Injects all keys from a Secret or ConfigMap as env vars.
# Example:
#   extraEnvFrom:
#     - secretRef:
#         name: nora-s3-credentials
extraEnvFrom: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}
