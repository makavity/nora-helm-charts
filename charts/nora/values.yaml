replicaCount: 1

image:
  repository: ghcr.io/getnora-io/nora
  # -- Overrides the image tag. Defaults to Chart.appVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 4000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: registry.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: registry-tls
  #    hosts:
  #      - registry.example.com

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  annotations: {}

config:
  server:
    host: "0.0.0.0"
    port: 4000
  storage:
    mode: local
    path: /data/storage
  gc:
    enabled: true
    interval: 86400
  retention:
    enabled: false
    interval: 86400
    rules: []

# -- Extra environment variables passed to the NORA container.
env: {}
  # NORA_AUTH_ENABLED: "true"
  # NORA_RATE_LIMIT_ENABLED: "true"

# -- Sensitive environment variables stored in a Secret.
secrets: {}
  # NORA_STORAGE_S3_ACCESS_KEY: ""
  # NORA_STORAGE_S3_SECRET_KEY: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}
